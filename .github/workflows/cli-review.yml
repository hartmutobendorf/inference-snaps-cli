name: CLI Skill Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - cmd/cli/**
      - .github/workflows/cli-review.yml
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  cli-review:
    uses: canonical/cli-skill/.github/workflows/cli-skill-review-reusable.yml@v1
    with:
      command: /cli-review
      fail_on_agent_error: true
      enforce_cli_metadata: false
    secrets:
      llm_token: ${{ secrets.OPENROUTER_API_KEY }}
      gh_token: ${{ secrets.GITHUB_TOKEN }}
