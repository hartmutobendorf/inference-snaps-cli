name: cuda-generic
description: Nvidia GPUs using CUDA. All major CUDA versions are targeted.
summary: CUDA generic engine
vendor: Canonical Ltd
devices:
  allof:
    - type: cpu
      architecture: amd64
      flags: [sse4_2, f16c, fma, avx, avx2]
    - type: gpu
      bus: pci
      vendor-id: 0x10de # Nvidia Corporation
      # model-ids: [ ]
      vram: 5G
      # compute-capability: 5.0

runtime: llama-cpp-cuda

model:
  default: 26b-q4-k-m-gguf
  options:
    - 26b-q4-k-m-gguf
    - 30b-a3b-q4-k-m-gguf

configurations:
  sleep-idle-seconds: 600
